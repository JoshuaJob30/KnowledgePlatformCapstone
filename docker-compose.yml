version: "3.9"

services:
  backend:
    build: ./KNOWLEDGE_PLATFORM_BACKEND
    container_name: knowledge_backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    restart: unless-stopped

  frontend:
    build: ./KNOWLEDGE_PLATFORM_FRONTEND
    container_name: knowledge_frontend
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      - NEXT_PUBLIC_API_URL=http://backend:8000
    depends_on:
      - backend
    restart: unless-stopped
